# Nota: en el repo principal (ILB-FRONTEND) el despliegue usa el netlify.toml de la RAÍZ del repo,
# porque la app está en esta carpeta pero el proyecto git incluye otros archivos fuera de ilb-react/.
# Si despliegas solo esta carpeta, esta configuración sí aplica por sí sola.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false

[[redirects]]
  from = "/api/payment/create"
  to = "/.netlify/functions/payment-create"
  status = 200

[[redirects]]
  from = "/api/payment/verify"
  to = "/.netlify/functions/payment-verify"
  status = 200

[[redirects]]
  from = "/api/payment/notify"
  to = "/.netlify/functions/payment-notify"
  status = 200

[[redirects]]
  from = "/api/payment/cancel"
  to = "/.netlify/functions/payment-cancel"
  status = 200

[[redirects]]
  from = "/api/reservas/slots"
  to = "/.netlify/functions/reservas-slots"
  status = 200

[[redirects]]
  from = "/api/reservas"
  to = "/.netlify/functions/reservas-list"
  status = 200

[[redirects]]
  from = "/api/bloqueos"
  to = "/.netlify/functions/bloqueos"
  status = 200

[[redirects]]
  from = "/api/admin/login"
  to = "/.netlify/functions/admin-login"
  status = 200

[[redirects]]
  from = "/api/admin/config"
  to = "/.netlify/functions/admin-config"
  status = 200

[[redirects]]
  from = "/api/admin/reservas"
  to = "/.netlify/functions/admin-reservas"
  status = 200

[[redirects]]
  from = "/api/admin/reserva-manual"
  to = "/.netlify/functions/admin-reserva-manual"
  status = 200

[[redirects]]
  from = "/api/admin/users"
  to = "/.netlify/functions/admin-users"
  status = 200

[[redirects]]
  from = "/api/config"
  to = "/.netlify/functions/public-config"
  status = 200

[[redirects]]
  from = "/api/payment/resolve-pending"
  to = "/.netlify/functions/payment-resolve-pending"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

# ── Scheduled Function: resolver pagos pendientes cada 24h (3:00 AM UTC-5 = 8:00 AM UTC) ──
[functions."payment-resolve-pending"]
  schedule = "*/15 * * * *"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
